<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Insurance Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0A0F1E;
      --bg-nav: #060B18;
      --bg-card:#111827;
      --border: #1E2A3A;
      --gold:   #C9A84C;
      --text:   #F0F4F8;
      --muted:  #8899AA;
      --red:    #EF4444;
      --green:  #10B981;
    }

    html, body {
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    /* subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 400px;
      margin: 0 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      margin-bottom: 28px;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
      margin-bottom: 28px;
    }

    /* Form */
    #login-form { display: flex; flex-direction: column; gap: 12px; }

    label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input[type="email"] {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.18s;
    }
    input[type="email"]:focus { border-color: var(--gold); }
    input[type="email"]::placeholder { color: #3D4F63; }

    #submit-btn {
      width: 100%;
      padding: 12px;
      background: var(--gold);
      border: none;
      border-radius: 5px;
      color: #060B18;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.18s;
      margin-top: 4px;
    }
    #submit-btn:hover:not(:disabled) { opacity: 0.88; }
    #submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Error */
    #error-msg {
      display: none;
      font-size: 12px;
      color: var(--red);
      padding: 10px 12px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 4px;
    }
    #error-msg.on { display: block; }

    /* Success state */
    #success-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
      padding: 8px 0;
    }
    #success-state.on { display: flex; }

    .success-icon {
      width: 48px; height: 48px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .success-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .success-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
    }

    .back-link {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 4px;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
    }
    .back-link:hover { color: var(--text); }

    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 32px;
      background: var(--bg-nav);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--muted);
      z-index: 1;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="logo">
    <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
      <path d="M1 8h2.5l2-5 2.5 10 2-6.5 1.5 3.5H15"
        stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="logo-text">Insurance Daily</span>
  </div>

  <h1>Sign in to Insurance Daily</h1>
  <p class="subtitle">Enter your email to receive a secure sign-in link</p>

  <!-- Form -->
  <div id="login-form">
    <div>
      <label for="email-input">Email address</label>
      <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div id="error-msg"></div>
    <button id="submit-btn" onclick="sendMagicLink()">Send sign-in link</button>
  </div>

  <!-- Success -->
  <div id="success-state">
    <div class="success-icon">✉</div>
    <div class="success-title">Check your inbox</div>
    <p class="success-sub">Your sign-in link is on its way.<br>Click the link in the email to access the dashboard.</p>
    <button class="back-link" onclick="resetForm()">Use a different email</button>
  </div>

</div>

<footer>Insurance Daily &nbsp;·&nbsp; Invite-only access</footer>

<script>
  // ── SUPABASE CONFIG ──────────────────────────────────────────
  const SUPABASE_URL      = 'YOUR_SUPABASE_URL';
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
  // ────────────────────────────────────────────────────────────

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // If already logged in, go straight to dashboard
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.replace('index.html');
  })();

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('on');
  }
  function clearError() {
    document.getElementById('error-msg').classList.remove('on');
  }

  async function sendMagicLink() {
    clearError();
    const email = document.getElementById('email-input').value.trim();
    if (!email) { showError('Please enter your email address.'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    const { error } = await sb.auth.signInWithOtp({
      email,
      options: {
        emailRedirectTo: window.location.origin + '/index.html',
      },
    });

    if (error) {
      showError(error.message || 'Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Send sign-in link';
      return;
    }

    document.getElementById('login-form').style.display = 'none';
    document.getElementById('success-state').classList.add('on');
  }

  function resetForm() {
    document.getElementById('login-form').style.display = '';
    document.getElementById('success-state').classList.remove('on');
    document.getElementById('email-input').value = '';
    clearError();
  }

  // Allow Enter key to submit
  document.getElementById('email-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMagicLink();
  });
</script>
</body>
</html>
