<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Insurance Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100vh;
      margin: 0;
      overflow: hidden;
      background: #FDF8F0;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 0 20px;
    }

    .login-logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      font-weight: 600;
      color: #1A1A1A;
      text-align: center;
    }

    .login-tagline {
      font-size: 13px;
      color: #9A8A7A;
      margin-top: 6px;
      text-align: center;
    }

    .card {
      background: #FDF8F0;
      border: 1px solid #E8DDD0;
      border-top: 3px solid #1A1A1A;
      border-radius: 8px;
      padding: 36px 40px;
      width: 380px;
      max-width: 100%;
      margin-top: 28px;
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #1A1A1A;
      margin-bottom: 7px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: #FDF8F0;
      border: 1.5px solid #D4C8B8;
      border-radius: 4px;
      padding: 10px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: #1A1A1A;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="email"]:focus,
    input[type="password"]:focus { border-color: #1A1A1A; }
    input[type="email"].error,
    input[type="password"].error { border-color: #DC2626; }
    input[type="email"]::placeholder,
    input[type="password"]::placeholder { color: #B8A898; }

    #error-msg {
      display: none;
      font-size: 12px;
      color: #DC2626;
      margin-top: 7px;
    }
    #error-msg.on { display: block; }

    #submit-btn {
      width: 100%;
      background: #1A1A1A;
      color: #FDF8F0;
      border: none;
      border-radius: 4px;
      padding: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }
    #submit-btn:hover:not(:disabled) { background: #333; }
    #submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .forgot-link {
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #9A8A7A;
      cursor: pointer;
      text-decoration: underline;
      margin-top: 12px;
      display: block;
      text-align: center;
      transition: color 0.15s;
    }
    .forgot-link:hover { color: #1A1A1A; }

    /* Reset password state */
    #reset-state { display: none; }
    #reset-state.on { display: block; }

    /* Success state */
    #success-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }
    #success-state.on { display: flex; }

    .success-check {
      font-size: 28px;
      color: #2D7A4F;
      line-height: 1;
    }

    .success-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 18px;
      color: #1A1A1A;
    }

    .success-sub {
      font-size: 13px;
      color: #9A8A7A;
      line-height: 1.55;
    }

    .back-link {
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #9A8A7A;
      cursor: pointer;
      text-decoration: underline;
      margin-top: 4px;
      transition: color 0.15s;
    }
    .back-link:hover { color: #1A1A1A; }

    .login-footer {
      font-size: 11px;
      color: #9A8A7A;
      text-align: center;
      margin-top: 24px;
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">Insurance Daily</div>
  <div class="login-tagline">Intelligence for insurance professionals</div>

  <div class="card">

    <!-- Sign in form -->
    <div id="login-form">
      <div class="field">
        <label for="email-input">Email address</label>
        <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="password-input">Password</label>
        <input type="password" id="password-input" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div id="error-msg"></div>
      <button id="submit-btn" onclick="signIn()">Sign in</button>
      <button class="forgot-link" onclick="showReset()">Forgot password?</button>
    </div>

    <!-- Forgot password form -->
    <div id="reset-state">
      <div class="field">
        <label for="reset-email-input">Email address</label>
        <input type="email" id="reset-email-input" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div id="error-msg-reset" style="display:none; font-size:12px; color:#DC2626; margin-top:7px;"></div>
      <button id="reset-btn" onclick="sendReset()">Send reset link</button>
      <button class="back-link" style="margin-top:12px; display:block; text-align:center;" onclick="showLogin()">Back to sign in</button>
    </div>

    <!-- Reset email sent confirmation -->
    <div id="success-state">
      <div class="success-check">✓</div>
      <div class="success-title">Check your inbox</div>
      <p class="success-sub">A password reset link has been sent to <span id="sent-email"></span></p>
      <button class="back-link" onclick="showLogin()">Back to sign in</button>
    </div>

  </div>

  <div class="login-footer">Access by invitation only</div>
</div>

<script>
  const SUPABASE_URL      = 'https://ogpfdrpoujrekgbrfilk.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ncGZkcnBvdWpyZWtnYnJmaWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTQxODksImV4cCI6MjA4OTk3MDE4OX0.dcE_FaWQEMlYorjj0S9M5jIGCV5U2nobmc5D0RFnApM';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.replace('index.html');
  })();

  // --- Helpers ---

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    el.classList.add('on');
    document.getElementById('email-input').classList.add('error');
    document.getElementById('password-input').classList.add('error');
  }

  function clearError() {
    const el = document.getElementById('error-msg');
    el.classList.remove('on');
    el.style.display = '';
    document.getElementById('email-input').classList.remove('error');
    document.getElementById('password-input').classList.remove('error');
  }

  // --- Sign in ---

  async function signIn() {
    clearError();
    const email    = document.getElementById('email-input').value.trim();
    const password = document.getElementById('password-input').value;

    if (!email)    { showError('Please enter your email address.'); return; }
    if (!password) { showError('Please enter your password.'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled    = true;
    btn.textContent = 'Signing in…';

    const { error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      const msg = error.message.includes('Invalid login credentials')
        ? 'Incorrect email or password.'
        : (error.message || 'Something went wrong. Please try again.');
      showError(msg);
      btn.disabled    = false;
      btn.textContent = 'Sign in';
      return;
    }

    window.location.replace('index.html');
  }

  // --- Forgot password ---

  function showReset() {
    document.getElementById('login-form').style.display    = 'none';
    document.getElementById('reset-state').classList.add('on');
    document.getElementById('success-state').classList.remove('on');
    const emailVal = document.getElementById('email-input').value.trim();
    if (emailVal) document.getElementById('reset-email-input').value = emailVal;
  }

  function showLogin() {
    document.getElementById('login-form').style.display = '';
    document.getElementById('reset-state').classList.remove('on');
    document.getElementById('success-state').classList.remove('on');
    clearError();
  }

  async function sendReset() {
    const email = document.getElementById('reset-email-input').value.trim();
    const errEl = document.getElementById('error-msg-reset');

    errEl.style.display = 'none';
    document.getElementById('reset-email-input').classList.remove('error');

    if (!email) {
      errEl.textContent   = 'Please enter your email address.';
      errEl.style.display = 'block';
      document.getElementById('reset-email-input').classList.add('error');
      return;
    }

    const btn = document.getElementById('reset-btn');
    btn.disabled    = true;
    btn.textContent = 'Sending…';

    await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html',
    });

    // Always show success (don't reveal whether email exists)
    document.getElementById('reset-state').classList.remove('on');
    document.getElementById('sent-email').textContent = email;
    document.getElementById('success-state').classList.add('on');

    btn.disabled    = false;
    btn.textContent = 'Send reset link';
  }

  // --- Keyboard shortcuts ---

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (!document.getElementById('reset-state').classList.contains('on')) {
      signIn();
    } else {
      sendReset();
    }
  });
</script>
</body>
</html>
