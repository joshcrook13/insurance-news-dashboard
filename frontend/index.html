<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insurance Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0A0F1E;
      --bg-nav:    #060B18;
      --bg-card:   #111827;
      --bg-hover:  #0D1525;
      --border:    #1E2A3A;
      --gold:      #C9A84C;
      --text:      #F0F4F8;
      --muted:     #8899AA;
      --green:     #10B981;
      --src-ij:    #1D4ED8;
      --src-bi:    #7C3AED;
      --src-cm:    #0891B2;
      --src-cj:    #059669;
      --src-ibm:   #DB2777;
      --src-multi: #C9A84C;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════════════
       NAV BAR — 48px fixed
    ══════════════════════════════════════ */
    #nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: var(--bg-nav);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 200;
      gap: 10px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.2px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-logo svg { flex-shrink: 0; }

    .nav-pipe {
      width: 1px;
      height: 16px;
      background: var(--border);
      flex-shrink: 0;
      margin: 0 4px;
    }

    #nav-date {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .nav-gap { flex: 1; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #374151;
      flex-shrink: 0;
      transition: background 0.4s;
    }
    #live-dot.on {
      background: var(--green);
      animation: breathe 2.2s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.45; }
    }

    #refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 13px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s;
    }
    #refresh-btn:hover:not(:disabled) {
      border-color: var(--gold);
      color: var(--gold);
    }
    #refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .ri {
      font-size: 13px;
      display: inline-block;
      line-height: 1;
    }
    #refresh-btn.spinning .ri { animation: spin 0.65s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════
       PAGE SHELL — two columns below nav
    ══════════════════════════════════════ */
    #shell {
      display: flex;
      margin-top: 48px;
      min-height: calc(100vh - 48px - 32px);
    }

    /* ══════════════════════════════════════
       LEFT SIDEBAR — 140px
    ══════════════════════════════════════ */
    #sidebar {
      width: 140px;
      flex-shrink: 0;
      background: var(--bg);
      border-right: 1px solid var(--border);
      position: sticky;
      top: 48px;
      height: calc(100vh - 48px);
      overflow-y: auto;
      padding: 20px 0 20px;
      scrollbar-width: none;
    }
    #sidebar::-webkit-scrollbar { display: none; }

    .sb-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      padding: 0 14px 10px;
      display: block;
    }

    .cat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 14px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      gap: 6px;
      user-select: none;
    }
    .cat-row:hover { background: var(--bg-hover); }
    .cat-row.active {
      border-left-color: var(--gold);
      background: var(--bg-hover);
    }
    .cat-row.active .cat-name { color: var(--text); font-weight: 600; }

    .cat-name {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .cat-count {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 10px;
      background: var(--border);
      color: var(--muted);
      flex-shrink: 0;
      min-width: 20px;
      text-align: center;
      transition: background 0.15s, color 0.15s;
    }
    .cat-row.active .cat-count {
      background: rgba(201,168,76,0.15);
      color: var(--gold);
    }

    /* ══════════════════════════════════════
       MAIN CONTENT
    ══════════════════════════════════════ */
    #main {
      flex: 1;
      min-width: 0;
      padding: 20px 24px 40px;
    }

    /* ── Source helpers ── */
    .src-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-block;
    }

    .cat-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--border);
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Time ago ── */
    .time-str {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* ══════════════════════════════════════
       HERO
    ══════════════════════════════════════ */
    #hero-wrap { margin-bottom: 20px; }

    .hero-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      padding: 20px;
      border-radius: 5px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: background 0.18s;
      cursor: pointer;
    }
    .hero-card:hover { background: var(--bg-hover); }

    .hero-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .hero-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .hero-src {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero-top-right { margin-left: auto; }

    .hero-title {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.35;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .hero-summary {
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .hero-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .hero-cats { display: flex; gap: 6px; flex-wrap: wrap; }

    .hero-cta {
      font-size: 12px;
      font-weight: 600;
      color: var(--gold);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════
       2×2 GRID
    ══════════════════════════════════════ */
    #grid-wrap { margin-bottom: 20px; }

    .grid-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .gl-left {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .gl-right {
      font-size: 11px;
      color: var(--muted);
    }

    .story-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .story-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: background 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .story-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
    }
    .story-card.c-ij::before  { background: var(--src-ij); }
    .story-card.c-bi::before  { background: var(--src-bi); }
    .story-card.c-cm::before  { background: var(--src-cm); }
    .story-card.c-cj::before  { background: var(--src-cj); }
    .story-card.c-ibm::before { background: var(--src-ibm); }
    .story-card.c-multi::before { background: var(--gold); }
    .story-card:hover { background: var(--bg-hover); }

    .story-top {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .story-src-name {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      flex: 1;
    }
    .story-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.45;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .story-summary {
      font-size: 11px;
      line-height: 1.55;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }
    .story-foot {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: auto;
    }

    /* ══════════════════════════════════════
       MARKET BRIEFING
    ══════════════════════════════════════ */
    #brief-wrap {}

    .brief-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0;
      padding: 0 0 10px;
    }
    .brief-hl {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .brief-sub {
      font-size: 11px;
      color: var(--muted);
    }

    .brief-list {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
    }

    .brief-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .brief-row:last-child { border-bottom: none; }
    .brief-row:hover { background: var(--bg-hover); }

    .brief-num {
      font-size: 18px;
      font-weight: 700;
      color: var(--border);
      min-width: 28px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      user-select: none;
    }

    .brief-center {
      flex: 1;
      min-width: 0;
    }
    .brief-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .brief-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 3px;
    }
    .brief-src {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .brief-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .brief-arr {
      font-size: 11px;
      color: var(--muted);
      transition: color 0.15s, transform 0.15s;
    }
    .brief-row:hover .brief-arr { color: var(--gold); transform: translateX(3px); }

    /* ══════════════════════════════════════
       SKELETON
    ══════════════════════════════════════ */
    .sk {
      background: linear-gradient(90deg, var(--border) 25%, #243347 50%, var(--border) 75%);
      background-size: 400% 100%;
      animation: shimmer 1.5s ease infinite;
      border-radius: 4px;
    }
    @keyframes shimmer {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
    .sk-hero  { height: 130px; margin-bottom: 20px; border-radius: 5px; }
    .sk-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .sk-gcard { height: 120px; border-radius: 5px; }
    .sk-blist { border-radius: 5px; overflow: hidden; }
    .sk-brow  { height: 56px; border-bottom: 1px solid var(--bg); }
    .sk-brow:last-child { border-bottom: none; }

    /* ══════════════════════════════════════
       ERROR
    ══════════════════════════════════════ */
    #error-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 0;
      gap: 12px;
      text-align: center;
    }
    #error-state.on { display: flex; }
    .err-icon { font-size: 28px; color: var(--gold); }
    .err-text { font-size: 14px; color: var(--muted); }
    .err-btn {
      padding: 8px 20px;
      border: 1px solid var(--gold);
      border-radius: 4px;
      background: transparent;
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .err-btn:hover { background: var(--gold); color: var(--bg-nav); }

    /* ══════════════════════════════════════
       VISIBILITY HELPERS
    ══════════════════════════════════════ */
    #skeleton { display: none; }
    #skeleton.on { display: block; }
    #content { display: none; }
    #content.on { display: block; animation: fadeIn 0.35s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* empty filtered state */
    .no-results {
      padding: 32px 0;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    /* ══════════════════════════════════════
       FOOTER
    ══════════════════════════════════════ */
    footer {
      height: 32px;
      background: var(--bg-nav);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    footer span { font-size: 11px; color: var(--muted); }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 768px) {
      #sidebar { display: none; }
      .story-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      #main { padding: 16px 14px 32px; }
      #nav-date { display: none; }
    }
  </style>
</head>
<body>

<!-- ══ NAV ══ -->
<nav id="nav">
  <div class="nav-logo">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M1 8h2.5l2-5 2.5 10 2-6.5 1.5 3.5H15" stroke="#C9A84C"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Insurance Daily
  </div>
  <div class="nav-pipe"></div>
  <span id="nav-date"></span>
  <div class="nav-gap"></div>
  <div class="nav-right">
    <div class="live-pill">
      <div id="live-dot"></div>
      Live
    </div>
    <button id="refresh-btn" onclick="loadNews()">
      <span class="ri">↻</span> Refresh
    </button>
  </div>
</nav>

<!-- ══ SHELL ══ -->
<div id="shell">

  <!-- LEFT SIDEBAR -->
  <aside id="sidebar">
    <span class="sb-label">Categories</span>
    <div id="cat-nav"></div>
  </aside>

  <!-- MAIN -->
  <div id="main">

    <div id="error-state">
      <div class="err-icon">⚠</div>
      <p class="err-text">Unable to load latest articles.</p>
      <button class="err-btn" onclick="loadNews()">Retry</button>
    </div>

    <div id="skeleton">
      <div class="sk sk-hero"></div>
      <div class="sk-grid">
        <div class="sk sk-gcard"></div>
        <div class="sk sk-gcard"></div>
        <div class="sk sk-gcard"></div>
        <div class="sk sk-gcard"></div>
      </div>
      <div class="sk-blist">
        <div class="sk sk-brow"></div>
        <div class="sk sk-brow"></div>
        <div class="sk sk-brow"></div>
        <div class="sk sk-brow"></div>
        <div class="sk sk-brow"></div>
      </div>
    </div>

    <div id="content">
      <div id="hero-wrap"></div>
      <div id="grid-wrap">
        <div class="grid-label">
          <span class="gl-left">Top Stories</span>
          <span class="gl-right">Articles 2–5</span>
        </div>
        <div class="story-grid" id="story-grid"></div>
      </div>
      <div id="brief-wrap">
        <div class="brief-header">
          <span class="brief-hl">Market Briefing</span>
          <span class="brief-sub">Articles 6–10</span>
        </div>
        <div class="brief-list" id="brief-list"></div>
      </div>
    </div>

  </div>
</div>

<!-- ══ FOOTER ══ -->
<footer>
  <span>Sources: Insurance Journal · Business Insurance · Carrier Management · Claims Journal · Insurance Business</span>
  <span>Built with Claude Code</span>
</footer>

<script>
  // ── CONFIG ───────────────────────────────────────────────────
  const API_BASE = "https://insurance-news-dashboard.onrender.com";
  // ─────────────────────────────────────────────────────────────

  const $ = id => document.getElementById(id);

  // ── CATEGORY DEFINITIONS ──
  const CATS = [
    { name: "All", keys: [] },
    { name: "Property & Casualty", keys: ["property","casualty","homeowner","home","liability","p&c","fire","flood","theft","dwelling","damage"] },
    { name: "Reinsurance",         keys: ["reinsurance","reinsurer","retrocession","treaty","facultative","swiss re","munich re","cedent"] },
    { name: "Markets",             keys: ["investment","acquisition","merger","premium","rate","pricing","revenue","profit","loss ratio","combined ratio"] },
    { name: "Cyber",               keys: ["cyber","ransomware","data breach","hack","malware","technology","digital","ai","cloud"] },
    { name: "Climate & CAT",       keys: ["climate","catastrophe","cat","flood","wildfire","hurricane","tornado","earthquake","storm","esg"] },
    { name: "Life & Health",       keys: ["life","health","medical","mortality","longevity","annuity","pension","benefit","wellness"] },
    { name: "Regulatory",          keys: ["naic","fca","regulatory","regulation","compliance","legislation","bill","law","ruling","mandate"] },
    { name: "Commercial",          keys: ["commercial","corporate","enterprise","workers compensation","employer","sme","business insurance"] },
    { name: "Motor",               keys: ["motor","auto","vehicle","car","truck","fleet"," ev ","electric vehicle"] },
  ];

  // ── DATE ──
  function setNavDate() {
    const d = new Date();
    const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    $("nav-date").textContent = `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  function timeAgo(raw) {
    if (!raw) return "";
    try {
      const d = new Date(raw);
      if (isNaN(d)) return raw.toString().slice(0, 20);
      const diff = Math.floor((Date.now() - d) / 60000);
      if (diff < 1)   return "Just now";
      if (diff < 60)  return `${diff}m ago`;
      if (diff < 1440) return `${Math.floor(diff/60)}h ago`;
      return `${Math.floor(diff/1440)}d ago`;
    } catch(_) { return ""; }
  }

  function esc(s) {
    return String(s ?? "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ── SOURCE COLOUR ──
  function srcColor(source) {
    const s = (source||"").toLowerCase();
    if (s.includes("insurance journal"))  return "var(--src-ij)";
    if (s.includes("business insurance")) return "var(--src-bi)";
    if (s.includes("carrier management")) return "var(--src-cm)";
    if (s.includes("claims journal"))     return "var(--src-cj)";
    if (s.includes("insurance business")) return "var(--src-ibm)";
    return "var(--src-multi)";
  }
  function srcCardClass(source) {
    const s = (source||"").toLowerCase();
    if (s.includes("insurance journal"))  return "c-ij";
    if (s.includes("business insurance")) return "c-bi";
    if (s.includes("carrier management")) return "c-cm";
    if (s.includes("claims journal"))     return "c-cj";
    if (s.includes("insurance business")) return "c-ibm";
    return "c-multi";
  }

  // ── CATEGORY MATCHING ──
  function getCategories(article) {
    const haystack = ((article.title || "") + " " + (article.summary || "")).toLowerCase();
    const matched = [];
    for (const cat of CATS) {
      if (cat.name === "All") continue;
      if (cat.keys.some(k => haystack.includes(k))) {
        matched.push(cat.name);
      }
    }
    return matched.length ? matched : ["Markets"];
  }

  function catTagsHtml(cats, max = 2) {
    return cats.slice(0, max).map(c => `<span class="cat-tag">${esc(c)}</span>`).join("");
  }

  // ── SIDEBAR ──
  let allArticles = [];
  let activeCat   = "All";

  function buildSidebar(articles) {
    const counts = {};
    for (const cat of CATS) {
      if (cat.name === "All") { counts["All"] = articles.length; continue; }
      counts[cat.name] = articles.filter(a => {
        const h = ((a.title||"")+" "+(a.summary||"")).toLowerCase();
        return cat.keys.some(k => h.includes(k));
      }).length;
    }

    $("cat-nav").innerHTML = CATS.map(cat => `
      <div class="cat-row${activeCat === cat.name ? " active" : ""}"
           onclick="selectCat('${esc(cat.name)}')">
        <span class="cat-name">${esc(cat.name)}</span>
        <span class="cat-count">${counts[cat.name] || 0}</span>
      </div>
    `).join("");
  }

  function selectCat(name) {
    activeCat = name;
    let filtered;
    if (name === "All") {
      filtered = allArticles;
    } else {
      const catDef = CATS.find(c => c.name === name);
      filtered = allArticles.filter(a => {
        const h = ((a.title||"")+" "+(a.summary||"")).toLowerCase();
        return catDef.keys.some(k => h.includes(k));
      });
    }
    renderContent(filtered);
    buildSidebar(allArticles); // re-render sidebar to update active state
  }

  // ── RENDER ──
  function renderContent(articles) {
    const content = $("content");

    if (!articles.length) {
      content.innerHTML = `<p class="no-results">No articles in this category.</p>`;
      return;
    }

    // Hero
    const h = articles[0];
    const hCats = getCategories(h);
    $("hero-wrap").innerHTML = `
      <a class="hero-card" href="${esc(h.url)}" target="_blank" rel="noopener">
        <div class="hero-top">
          <span class="hero-badge">Top Story</span>
          <span class="hero-src">${esc(h.source)}</span>
          <span class="hero-top-right time-str">${timeAgo(h.date)}</span>
        </div>
        <div class="hero-title">${esc(h.title)}</div>
        <div class="hero-summary">${esc(h.summary) || "Click to read the full article."}</div>
        <div class="hero-foot">
          <div class="hero-cats">${catTagsHtml(hCats, 3)}</div>
          <span class="hero-cta">Read full article →</span>
        </div>
      </a>`;

    // Grid (articles 1–4)
    const gridArts = articles.slice(1, 5);
    if (gridArts.length) {
      $("story-grid").innerHTML = gridArts.map(a => {
        const cc = srcCardClass(a.source);
        const col = srcColor(a.source);
        const cats = getCategories(a);
        return `
          <a class="story-card ${cc}" href="${esc(a.url)}" target="_blank" rel="noopener">
            <div class="story-top">
              <span class="src-dot" style="background:${col}"></span>
              <span class="story-src-name">${esc(a.source)}</span>
              <span class="time-str">${timeAgo(a.date)}</span>
            </div>
            <div class="story-title">${esc(a.title)}</div>
            <div class="story-summary">${esc(a.summary) || ""}</div>
            <div class="story-foot">${catTagsHtml(cats)}</div>
          </a>`;
      }).join("");
      $("grid-wrap").style.display = "";
    } else {
      $("grid-wrap").style.display = "none";
    }

    // Briefing (articles 5–9)
    const briefArts = articles.slice(5, 10);
    if (briefArts.length) {
      $("brief-list").innerHTML = briefArts.map((a, i) => {
        const col = srcColor(a.source);
        const cats = getCategories(a);
        const num = String(i + 1).padStart(2, "0");
        return `
          <a class="brief-row" href="${esc(a.url)}" target="_blank" rel="noopener">
            <span class="brief-num">${num}</span>
            <span class="src-dot" style="background:${col}"></span>
            <div class="brief-center">
              <div class="brief-title">${esc(a.title)}</div>
              <div class="brief-meta">
                <span class="brief-src">${esc(a.source)}</span>
                ${cats.slice(0,1).map(c=>`<span class="cat-tag">${esc(c)}</span>`).join("")}
              </div>
            </div>
            <div class="brief-right">
              <span class="time-str">${timeAgo(a.date)}</span>
              <span class="brief-arr">→</span>
            </div>
          </a>`;
      }).join("");
      $("brief-wrap").style.display = "";
    } else {
      $("brief-wrap").style.display = "none";
    }
  }

  // ── STATE ──
  function setState(s) {
    $("skeleton").className    = s === "loading" ? "on" : "";
    $("content").className     = s === "loaded"  ? "on" : "";
    $("error-state").className = s === "error"   ? "on" : "";
    $("live-dot").className    = s === "loaded"  ? "on" : "";
    const btn = $("refresh-btn");
    btn.disabled  = s === "loading";
    btn.className = s === "loading" ? "spinning" : "";
  }

  // ── LOAD ──
  async function loadNews() {
    setState("loading");
    try {
      const res = await fetch(`${API_BASE}/news`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (!data.articles?.length) throw new Error("empty");

      allArticles = data.articles;
      activeCat = "All";

      renderContent(allArticles);
      buildSidebar(allArticles);
      setState("loaded");
    } catch(e) {
      console.error(e);
      setState("error");
    }
  }

  setNavDate();
  loadNews();
</script>
</body>
</html>
