<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insurance News Dashboard</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1117;
      --surface:     #1a1d27;
      --surface-2:   #222637;
      --border:      #2e3248;
      --accent:      #4f8ef7;
      --accent-glow: rgba(79,142,247,0.18);
      --text:        #e8eaf0;
      --text-muted:  #7b80a0;
      --text-dim:    #4a4f6a;
      --green:       #34d399;
      --orange:      #fb923c;
      --red:         #f87171;
      --purple:      #a78bfa;
      --radius:      12px;
      --radius-sm:   8px;
      --shadow:      0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #141829 0%, #1a2040 100%);
      border-bottom: 1px solid var(--border);
      padding: 28px 32px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo span {
      display: block;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-meta {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    #last-updated {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    #refresh-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }

    #refresh-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .refresh-icon { font-size: 1rem; line-height: 1; }

    /* ── Main content ── */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 24px 0;
    }

    /* ── Stats bar ── */
    #stats-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 5px 14px;
      font-size: 0.76rem;
      color: var(--text-muted);
    }

    .stat-chip strong { color: var(--text); }

    /* ── Grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      animation: fadeUp 0.35s ease both;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), var(--shadow);
      transform: translateY(-2px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(2)  { animation-delay: 0.04s; }
    .card:nth-child(3)  { animation-delay: 0.08s; }
    .card:nth-child(4)  { animation-delay: 0.12s; }
    .card:nth-child(5)  { animation-delay: 0.16s; }
    .card:nth-child(6)  { animation-delay: 0.20s; }
    .card:nth-child(7)  { animation-delay: 0.24s; }
    .card:nth-child(8)  { animation-delay: 0.28s; }
    .card:nth-child(9)  { animation-delay: 0.32s; }
    .card:nth-child(10) { animation-delay: 0.36s; }

    /* Card header row */
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex-shrink: 0;
    }

    /* Source badge */
    .source-badge {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      padding: 3px 9px;
      border-radius: 50px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .source-ij    { background: rgba(79,142,247,0.15);  color: #7eb5fb; border: 1px solid rgba(79,142,247,0.3); }
    .source-bi    { background: rgba(167,139,250,0.15); color: #c4b5fd; border: 1px solid rgba(167,139,250,0.3); }
    .source-cm    { background: rgba(52,211,153,0.15);  color: #6ee7b7; border: 1px solid rgba(52,211,153,0.3); }
    .source-cj    { background: rgba(251,191,36,0.15);  color: #fcd34d; border: 1px solid rgba(251,191,36,0.3); }
    .source-ibm   { background: rgba(244,114,182,0.15); color: #f9a8d4; border: 1px solid rgba(244,114,182,0.3); }
    .source-multi { background: rgba(251,146,60,0.15);  color: #fdba74; border: 1px solid rgba(251,146,60,0.3); }

    /* Trending badge */
    .trending-badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 50px;
      background: rgba(251,146,60,0.15);
      color: #fb923c;
      border: 1px solid rgba(251,146,60,0.3);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Rank number */
    .rank {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--text-dim);
      min-width: 22px;
    }

    /* Title */
    .card-title {
      font-size: 0.97rem;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text);
      flex: 1;
    }

    /* Meta row */
    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.76rem;
      color: var(--text-muted);
    }

    .card-meta .sep { color: var(--text-dim); }

    /* Summary */
    .card-summary {
      font-size: 0.84rem;
      line-height: 1.6;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    /* Score row */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: auto;
      padding-top: 4px;
      border-top: 1px solid var(--border);
    }

    .score-block {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .score-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .score-bar-wrap {
      width: 60px;
      height: 4px;
      background: var(--surface-2);
      border-radius: 2px;
      overflow: hidden;
    }

    .score-bar {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), #7c3aed);
      transition: width 0.6s ease;
    }

    .score-value {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }

    .trending-reason {
      font-size: 0.72rem;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
      text-align: right;
    }

    /* Read more link */
    .read-more {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      padding: 6px 14px;
      border: 1px solid rgba(79,142,247,0.3);
      border-radius: var(--radius-sm);
      background: var(--accent-glow);
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .read-more:hover {
      background: rgba(79,142,247,0.28);
      border-color: var(--accent);
    }

    /* ── Loading spinner ── */
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 80px 0;
    }

    #loading.visible { display: flex; }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* ── Error banner ── */
    #error-msg {
      display: none;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: var(--radius-sm);
      color: var(--red);
      padding: 14px 18px;
      font-size: 0.875rem;
      margin-bottom: 24px;
    }

    #error-msg.visible { display: block; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 20px 16px; }
      main { padding: 20px 12px 0; }
      #grid { grid-template-columns: 1fr; gap: 14px; }
      .header-inner { gap: 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">📊</div>
      <div>
        <h1>Insurance News</h1>
        <span>Trending &amp; Top Stories · Live Dashboard</span>
      </div>
    </div>
    <div class="header-meta">
      <span id="last-updated">Not yet loaded</span>
      <button id="refresh-btn" onclick="loadNews()">
        <span class="refresh-icon">↻</span> Refresh
      </button>
    </div>
  </div>
</header>

<main>
  <div id="stats-bar"></div>
  <div id="error-msg"></div>
  <div id="loading"><div class="spinner"></div><p>Fetching top 10 stories…</p></div>
  <div id="grid"></div>
</main>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────
  // Replace this URL with your live Render backend URL after deployment.
  // Example: "https://insurance-news-api.onrender.com"
  const API_BASE = "http://localhost:8000";
  // ────────────────────────────────────────────────────────────────────────

  const grid       = document.getElementById("grid");
  const loading    = document.getElementById("loading");
  const errorMsg   = document.getElementById("error-msg");
  const statsBar   = document.getElementById("stats-bar");
  const lastUp     = document.getElementById("last-updated");
  const refreshBtn = document.getElementById("refresh-btn");

  function sourceClass(source) {
    if (!source) return "source-multi";
    const s = source.toLowerCase();
    if (s.includes("insurance journal"))  return "source-ij";
    if (s.includes("business insurance")) return "source-bi";
    if (s.includes("carrier management")) return "source-cm";
    if (s.includes("claims journal"))     return "source-cj";
    if (s.includes("insurance business")) return "source-ibm";
    return "source-multi";
  }

  function formatDate(raw) {
    if (!raw) return "";
    try {
      const d = new Date(raw);
      if (!isNaN(d)) return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    } catch (_) {}
    return raw.replace(/\s+/g, " ").trim().slice(0, 30);
  }

  function scoreBarWidth(score, maxScore) {
    return Math.min(100, Math.round((score / (maxScore || 1)) * 100));
  }

  function renderCards(articles, stats) {
    const maxScore = articles.length ? articles[0].relevance_score : 1;

    grid.innerHTML = articles.map((a, i) => {
      const sc     = sourceClass(a.source);
      const multi  = a.source_count > 1;
      const dateStr = formatDate(a.date);
      const barW   = scoreBarWidth(a.relevance_score, maxScore);
      const reason = a.trending_reason || "";

      return `
        <div class="card">
          <div class="card-header">
            <span class="rank">#${i + 1}</span>
            <span class="card-title">${escHtml(a.title)}</span>
            <div class="card-badges">
              <span class="source-badge ${multi ? 'source-multi' : sc}">${escHtml(a.source)}</span>
              ${a.is_trending ? `<span class="trending-badge">🔥 Trending</span>` : ""}
            </div>
          </div>

          ${dateStr ? `<div class="card-meta"><span>📅 ${escHtml(dateStr)}</span></div>` : ""}

          <p class="card-summary">${escHtml(a.summary) || "<em style='color:var(--text-dim)'>No summary available.</em>"}</p>

          <div class="card-footer">
            <div class="score-block">
              <span class="score-label">Score</span>
              <div class="score-bar-wrap">
                <div class="score-bar" style="width:${barW}%"></div>
              </div>
              <span class="score-value">${a.relevance_score}</span>
            </div>
            <span class="trending-reason" title="${escHtml(reason)}">${escHtml(reason)}</span>
            ${a.url ? `<a class="read-more" href="${escHtml(a.url)}" target="_blank" rel="noopener">Read more →</a>` : ""}
          </div>
        </div>`;
    }).join("");

    if (stats) {
      statsBar.innerHTML = `
        <span class="stat-chip"><strong>${articles.length}</strong> top stories</span>
        <span class="stat-chip">Total scraped: <strong>${stats.total_scraped}</strong></span>
        <span class="stat-chip">Insurance Journal: <strong>${stats.insurance_journal}</strong></span>
        <span class="stat-chip">Business Insurance: <strong>${stats.business_insurance}</strong></span>
        <span class="stat-chip">Carrier Management: <strong>${stats.carrier_management}</strong></span>
        <span class="stat-chip">Claims Journal: <strong>${stats.claims_journal}</strong></span>
        <span class="stat-chip">Insurance Business: <strong>${stats.insurance_business_mag}</strong></span>`;
    }
  }

  function escHtml(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  async function loadNews() {
    refreshBtn.disabled = true;
    grid.innerHTML      = "";
    errorMsg.classList.remove("visible");
    loading.classList.add("visible");

    try {
      const res = await fetch(`${API_BASE}/news`);
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const data = await res.json();

      if (!data.articles || data.articles.length === 0) {
        throw new Error("No articles returned. The sources may be temporarily unavailable.");
      }

      renderCards(data.articles, data.stats);

      const ts = data.fetched_at ? new Date(data.fetched_at).toLocaleTimeString() : new Date().toLocaleTimeString();
      lastUp.textContent = `Updated ${ts}`;

    } catch (err) {
      errorMsg.textContent = `⚠ Could not load news: ${err.message}`;
      errorMsg.classList.add("visible");
      grid.innerHTML = "";
    } finally {
      loading.classList.remove("visible");
      refreshBtn.disabled = false;
    }
  }

  loadNews();
</script>
</body>
</html>
